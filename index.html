<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gerador de Story - Mercado Livre</title>
  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --yellow:#ffe600;
      --blue:#3483fa;
      --dark:#111827;
      --green:#00a650;
      --line:#e5e7eb;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      padding:18px;
    }
    .wrap{max-width:760px;margin:0 auto}
    h1{font-size:26px;margin:10px 0 4px}
    p{color:var(--muted);line-height:1.35}
    .panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:0 8px 24px rgba(0,0,0,.06);
      margin:16px 0;
    }
    label{display:block;font-weight:700;margin:12px 0 6px}
    input, textarea{
      width:100%;
      border:1px solid #d1d5db;
      border-radius:12px;
      padding:13px;
      font-size:16px;
      outline:none;
      background:#fff;
    }
    textarea{min-height:74px;resize:vertical}
    button{
      width:100%;
      border:0;
      border-radius:14px;
      padding:14px 16px;
      font-weight:800;
      font-size:16px;
      cursor:pointer;
      margin-top:12px;
    }
    .primary{background:linear-gradient(90deg,#ffe600,#ff8a00);color:#111827}
    .secondary{background:#111827;color:#fff}
    .smallbtn{width:auto;padding:10px 12px;font-size:14px;margin:8px 6px 0 0;border-radius:10px}
    .blue{background:var(--blue);color:#fff}
    .ghost{background:#eef2ff;color:#111827}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .status{font-size:14px;color:#374151;margin-top:10px;white-space:pre-wrap}
    .previewBox{display:flex;justify-content:center;overflow:auto;padding:8px;background:#eceff3;border-radius:16px}
    canvas{
      width:min(100%,360px);
      height:auto;
      border-radius:18px;
      background:#fff;
      box-shadow:0 10px 28px rgba(0,0,0,.12);
    }
    .hint{font-size:13px;color:#6b7280}
    .hidden{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Gerador de Story</h1>
    <p>Cole seu link de afiliado do Mercado Livre. O sistema tenta buscar foto, nome e preço, monta o story e baixa em PNG.</p>

    <div class="panel">
      <label>Link do produto / afiliado</label>
      <input id="url" placeholder="https://meli.la/..." value="" />

      <button class="primary" onclick="buscarProduto()">Buscar produto pelo link</button>
      <div id="status" class="status"></div>
    </div>

    <div class="panel">
      <label>Nome do produto</label>
      <textarea id="title" placeholder="Nome do produto"></textarea>

      <div class="row">
        <div>
          <label>Preço Original (R$)</label>
          <input id="price" placeholder="R$ 99,90" />
        </div>
        <div>
          <label>Desconto (%)</label>
          <input id="discount" placeholder="10" type="number" min="0" max="100" value="0" />
        </div>
      </div>

      <div class="row">
        <div>
          <label>Cupom opcional</label>
          <input id="coupon" placeholder="Ex: OFERTA10" />
        </div>
        <div>
          <label>Badge/Destaque</label>
          <input id="badge" placeholder="Ex: Última unidade" value="Última unidade" />
        </div>
      </div>

      <label>Imagem do produto</label>
      <input id="image" placeholder="URL da imagem" />
      <input id="upload" type="file" accept="image/*" onchange="usarImagemLocal(event)" style="margin-top:8px" />
      <p class="hint">Se a busca automática falhar, você pode colar a URL da imagem ou enviar uma foto/print do produto.</p>

      <button class="secondary" onclick="gerarStory()">Gerar story</button>
      <button class="blue" onclick="baixarStory()">Baixar PNG</button>
    </div>

    <div class="panel">
      <div class="previewBox">
        <canvas id="story" width="1080" height="1920"></canvas>
      </div>
    </div>
  </div>

<script>
const canvas = document.getElementById('story');
const ctx = canvas.getContext('2d');
let imagemLocal = null;

function setStatus(msg){ document.getElementById('status').textContent = msg; }

async function buscarProduto(){
  const url = document.getElementById('url').value.trim();
  if(!url){ setStatus('Cole um link primeiro.'); return; }

  setStatus('Buscando dados do produto...');
  try{
    const r = await fetch('/api/product?url=' + encodeURIComponent(url));
    const data = await r.json();

    if(!r.ok || data.error){
      setStatus('Não consegui puxar tudo automaticamente.\n' + (data.message || 'Você pode preencher os campos manualmente.'));
    } else {
      setStatus('Produto encontrado. Confira os campos e clique em Gerar story.');
    }

    if(data.title) document.getElementById('title').value = data.title;
    if(data.price) document.getElementById('price').value = data.price;
    if(data.image) document.getElementById('image').value = data.image;

    gerarStory();
  }catch(e){
    setStatus('Erro ao buscar. Preencha manualmente ou tente outro link.\n' + e.message);
  }
}

function usarImagemLocal(ev){
  const file = ev.target.files && ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    imagemLocal = reader.result;
    document.getElementById('image').value = 'Imagem enviada do celular';
    gerarStory();
  };
  reader.readAsDataURL(file);
}

function arredondarRetangulo(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

function wrapText(text, x, y, maxWidth, lineHeight, maxLines){
  const words = String(text || '').split(/\s+/);
  let line = '';
  let lines = [];
  for(let n=0; n<words.length; n++){
    const test = line + words[n] + ' ';
    if(ctx.measureText(test).width > maxWidth && n > 0){
      lines.push(line.trim());
      line = words[n] + ' ';
      if(lines.length >= maxLines) break;
    } else {
      line = test;
    }
  }
  if(lines.length < maxLines && line.trim()) lines.push(line.trim());
  lines.forEach((l,i)=>ctx.fillText(l, x, y + i*lineHeight));
  return y + lines.length*lineHeight;
}

function loadImageSafe(src){
  return new Promise((resolve) => {
    if(!src){ resolve(null); return; }
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = () => resolve(null);
    img.src = src;
  });
}

async function gerarStory(){
  const title = document.getElementById('title').value || 'Produto em oferta';
  const priceOriginal = document.getElementById('price').value || '0';
  const discount = parseFloat(document.getElementById('discount').value) || 0;
  const coupon = document.getElementById('coupon').value.trim();
  const badge = document.getElementById('badge').value.trim() || 'Última unidade';
  const imgUrl = imagemLocal || document.getElementById('image').value.trim();

  // Calcular preço final
  let priceNum = parseFloat(String(priceOriginal).replace('R$', '').replace(',', '.').trim());
  let finalPrice = priceNum;
  if(discount > 0) {
    finalPrice = priceNum * (1 - discount / 100);
  }

  ctx.clearRect(0,0,1080,1920);

  // Fundo
  const grad = ctx.createLinearGradient(0,0,0,1920);
  grad.addColorStop(0,'#fff7cc');
  grad.addColorStop(.42,'#ffffff');
  grad.addColorStop(1,'#f3f4f6');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,1080,1920);

  // Topo neutro
  ctx.fillStyle = '#111827';
  ctx.font = '900 58px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('OFERTA ENCONTRADA', 540, 135);

  ctx.fillStyle = '#4b5563';
  ctx.font = '500 32px Arial';
  ctx.fillText('Confira antes que acabe', 540, 184);

  // Card da imagem
  ctx.fillStyle = '#ffffff';
  arredondarRetangulo(ctx,70,245,940,855,54);
  ctx.fill();
  ctx.strokeStyle = '#e5e7eb';
  ctx.lineWidth = 4;
  ctx.stroke();

  const img = await loadImageSafe(imgUrl && imgUrl !== 'Imagem enviada do celular' ? imgUrl : imagemLocal);
  if(img){
    const boxX=115, boxY=300, boxW=850, boxH=745;
    const scale = Math.min(boxW/img.width, boxH/img.height);
    const w = img.width*scale, h = img.height*scale;
    ctx.drawImage(img, boxX+(boxW-w)/2, boxY+(boxH-h)/2, w, h);
  }else{
    ctx.fillStyle='#f3f4f6';
    arredondarRetangulo(ctx,115,300,850,745,38);
    ctx.fill();
    ctx.fillStyle='#9ca3af';
    ctx.font='700 38px Arial';
    ctx.fillText('Imagem do produto',540,670);
  }

  // MUDANÇAS PRINCIPAIS:
  // 1. REMOVIDO: Não desenha mais o retângulo azul escuro (#111827)
  // 2. Nome do produto em PRETO (#111111) em vez de branco
  // 3. Preço original riscado em cinza
  // 4. Preço final em PRETO (#111111) em vez de amarelo
  // 5. Cálculo automático do desconto

  // Nome do produto em PRETO (sem tarja azul)
  ctx.textAlign = 'left';
  ctx.fillStyle = '#111111'; // MUDANÇA: preto em vez de branco
  ctx.font = '800 48px Arial';
  wrapText(title, 120, 1225, 840, 62, 3);

  // Badge
  if(badge){
    ctx.fillStyle = '#ff6b00';
    ctx.font = '700 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🟧 ' + badge, 540, 1100);
  }

  // Preço original (riscado)
  ctx.fillStyle = '#999999';
  ctx.font = '700 48px Arial';
  ctx.textAlign = 'center';
  const priceStr = 'R$ ' + priceNum.toFixed(2).replace('.', ',');
  ctx.fillText(priceStr, 540, 1320);
  
  // Linha de risco
  const textWidth = ctx.measureText(priceStr).width;
  ctx.strokeStyle = '#999999';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(540 - textWidth/2, 1300);
  ctx.lineTo(540 + textWidth/2, 1300);
  ctx.stroke();

  // Preço final em PRETO (grande destaque)
  ctx.fillStyle = '#111111'; // MUDANÇA: preto em vez de amarelo
  ctx.font = '900 92px Arial';
  ctx.textAlign = 'center';
  const finalPriceStr = 'R$ ' + finalPrice.toFixed(2).replace('.', ',');
  ctx.fillText(finalPriceStr, 540, 1450);

  // Desconto (selo)
  if(discount > 0){
    ctx.fillStyle = '#ff6b00';
    ctx.font = '700 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🟩 ' + discount + '% OFF', 540, 1530);
  }

  // Cupom
  if(coupon){
    ctx.fillStyle = '#ffffff';
    arredondarRetangulo(ctx,120,1545,840,90,28);
    ctx.fill();
    ctx.fillStyle = '#111827';
    ctx.font = '900 38px Arial';
    ctx.fillText('CUPOM: ' + coupon.toUpperCase(), 155, 1605);
  }

  // Botão visual
  ctx.fillStyle = '#00a650';
  arredondarRetangulo(ctx,120,1655,840,120,38);
  ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.font = '900 48px Arial';
  ctx.fillText('CLIQUE NO LINK', 540, 1732);

  ctx.fillStyle = '#6b7280';
  ctx.font = '500 28px Arial';
  ctx.fillText('Preço e disponibilidade podem mudar', 540, 1848);
}

function baixarStory(){
  gerarStory().then(() => {
    const a = document.createElement('a');
    a.download = 'story-mercado-livre.png';
    a.href = canvas.toDataURL('image/png');
    a.click();
  });
}

gerarStory();
</script>
</body>
</html>
